# ============================================
#  deploy.yml - Vue3 管理后台自动化部署
#  触发条件：push 到 main 分支
# ============================================
name: Deploy Houduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create tar archive
        run: tar -czf dist.tar.gz -C dist .

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: 22
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            mkdir -p /www/sushang-houduan
            echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key.pem && chmod 600 /tmp/deploy_key.pem
            cat ${{ github.workspace }}/dist.tar.gz | ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key.pem root@47.96.102.163 "cd /www/sushang-houduan && tar -xz && nginx -s reload"
