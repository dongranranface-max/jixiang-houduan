<!doctype html>
<html lang="zh-CN">
  <head>
    <title>集享公社管理后台</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="集享公社电商平台管理后台：商品、订单、用户、理财、提现与系统配置。"
    />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <style>
      html {
        background-color: #faf8f3;
      }

      html.dark {
        background-color: #12110e;
      }
    </style>

    <script>
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) return
          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          console.warn('Failed to apply initial theme:', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
